<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deadly Rails</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        .ui { position: absolute; pointer-events: none; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 10; }
        .crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; background: white; border-radius: 50%; transform: translate(-50%, -50%); mix-blend-mode: difference; }
        #prompt { position: absolute; bottom: 40%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 12px 24px; border-radius: 30px; border: 2px solid #ffd700; font-weight: bold; display: none; }
        .stats { top: 20px; left: 20px; }
        .money { top: 20px; right: 20px; font-size: 24px; color: #4caf50; font-weight: 900; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; }
        .backpack { bottom: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 1px solid #ffd700; width: 140px; }
        .bar-container { width: 100%; height: 8px; background: #222; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        #steamFill { height: 100%; width: 0%; background: #ff6600; transition: width 0.2s; }
        #invBar { height: 100%; width: 0%; background: #ffd700; }
    </style>
</head>
<body>
    <div class="crosshair"></div>
    <div class="ui stats">
        <h1 class="text-2xl font-black italic text-yellow-400">DEADLY RAILS</h1>
        <div class="font-mono text-sm">VELOCIDADE: <span id="speed">0</span> km/h</div>
        <div class="bar-container"><div id="steamFill"></div></div>
    </div>
    <div class="ui money">$ <span id="moneyText">0</span></div>
    <div id="prompt" class="ui"></div>
    <div class="ui backpack">
        <div class="text-lg font-bold"><span id="invText">0</span> / 6</div>
        <div id="itemDesc" class="text-[10px] text-yellow-200">Vazio</div>
    </div>

    <script src="./js/world.js"></script>
    <script src="./js/train.js"></script>
    <script src="./js/player.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
